<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 대기질 & 바람 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Top Bar -->
    <div id="top-bar">
        <div class="logo">
            <span class="logo-text">AIR</span>
        </div>
        <div class="controls">
            <div class="control-group">
                <label>데이터</label>
                <select id="data-source">
                    <option value="demo">데모 모드</option>
                    <option value="openweather">OpenWeatherMap</option>
                    <option value="airkorea">에어코리아</option>
                </select>
            </div>
            <div class="control-group">
                <label>표시 항목</label>
                <select id="pollutant-select">
                    <option value="pm25">PM2.5</option>
                    <option value="pm10">PM10</option>
                    <option value="o3">오존(O₃)</option>
                    <option value="no2">NO₂</option>
                    <option value="aqi">통합 AQI</option>
                </select>
            </div>
            <div class="control-group">
                <button id="btn-wind" class="toggle-btn active" title="바람 표시">바람</button>
                <button id="btn-heatmap" class="toggle-btn active" title="대기질 히트맵">히트맵</button>
                <button id="btn-stations" class="toggle-btn active" title="측정소">측정소</button>
            </div>
            <div class="control-group">
                <button id="btn-refresh" class="action-btn" title="새로고침">갱신</button>
            </div>
        </div>
    </div>

    <!-- Time Slider -->
    <div id="time-panel">
        <div class="time-label" id="time-label">현재 실시간</div>
        <input type="range" id="time-slider" min="0" max="48" value="0" step="1">
        <div class="time-marks">
            <span>현재</span>
            <span>+12h</span>
            <span>+24h</span>
            <span>+36h</span>
            <span>+48h</span>
        </div>
    </div>

    <!-- Legend -->
    <div id="legend">
        <div class="legend-title">대기질 등급</div>
        <div class="legend-items">
            <div class="legend-item"><span class="color-box" style="background:#4ECDC4"></span>좋음 (0-50)</div>
            <div class="legend-item"><span class="color-box" style="background:#A7C957"></span>보통 (51-100)</div>
            <div class="legend-item"><span class="color-box" style="background:#E8A838"></span>나쁨 (101-150)</div>
            <div class="legend-item"><span class="color-box" style="background:#D9534F"></span>매우나쁨 (151-200)</div>
            <div class="legend-item"><span class="color-box" style="background:#8E6BAD"></span>위험 (201-300)</div>
            <div class="legend-item"><span class="color-box" style="background:#6B2D4F"></span>심각 (301+)</div>
        </div>
        <div class="legend-title" style="margin-top:10px">바람 속도</div>
        <div class="wind-scale">
            <div class="wind-bar"></div>
            <div class="wind-labels">
                <span>0</span><span>5</span><span>10</span><span>15+ m/s</span>
            </div>
        </div>
    </div>

    <!-- Station Info Panel -->
    <div id="station-panel" class="hidden">
        <button id="close-panel" class="close-btn">&times;</button>
        <h3 id="station-name">-</h3>
        <div id="station-aqi" class="aqi-badge">-</div>
        <div id="station-details"></div>
        <div id="station-chart">
            <canvas id="mini-chart" width="280" height="120"></canvas>
        </div>
        <div id="forecast-section">
            <h4>예측 (48시간)</h4>
            <div id="forecast-bars"></div>
        </div>
    </div>

    <!-- API Key Modal -->
    <div id="api-modal" class="modal hidden">
        <div class="modal-content">
            <h3>API 키 설정</h3>
            <div class="form-group">
                <label>OpenWeatherMap API Key</label>
                <input type="text" id="owm-key" placeholder="API key 입력...">
                <small><a href="https://openweathermap.org/api" target="_blank">무료 발급</a></small>
            </div>
            <div class="form-group">
                <label>에어코리아 API Key</label>
                <input type="text" id="airkorea-key" placeholder="API key 입력...">
                <small><a href="https://www.data.go.kr" target="_blank">공공데이터포털</a></small>
            </div>
            <div class="modal-buttons">
                <button id="save-keys">저장</button>
                <button id="cancel-keys">취소</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span>데이터 로딩 중...</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
